<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iKChat Ultimate Control Panel</title>
    <style>
        :root {
            /* --- GAME RULES ADJUSTMENTS --- */
            --rules-top: 22%;           /* Rules ko upar niche karne ke liye */
            --rules-width: 89%;
            --rules-font-size: 15px;    /* Rules ki likhwat choti karne ke liye */
            --line-width: 146px;        /* Center line ki lambai */

            /* Purane Controls */
            --timer-top: 31.5%;
            --timer-font-size: 14px; 
            --timer-color: #FFD700;
            --top3-group-top: 62%;      
            --avatar-size: 69px;        
            --frame-scale: 1.45;        
            --top3-name-size: -1px;
            --top3-gift-size: 10px;
            --profile-gap: -44px;

            /* Image Fit Scale */
            --rank1-img-scale: 99%; 
            --rank2-img-scale: 70%;
            --rank3-img-scale: 69%;

            /* Offsets */
            --rank1-y-offset: -986px; --rank2-y-offset: -944px; --rank3-y-offset: -944px;      
            --rank1-x-offset: 3px; --rank2-x-offset: -79px; --rank3-x-offset: 76px;      

            /* List Controls */
            --list-top: 48.8%; --list-height: 10.5%; --list-width: 43%; --list-font-size: 21px;
            --btn-bottom: 474px; --btn-right: 18px; --gold-color: #FFD700;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; background: #000;
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        .event-wrapper {
            position: relative; 
            width: 100%; 
            min-height: 280vw; 
            background: url('event.png') no-repeat top center;
            background-size: 100% auto;
        }

        /* --- NEW CLEAN GAME RULES (No Boxes) --- */
        .game-rules-section {
            position: absolute; top: var(--rules-top); left: 50%;
            transform: translateX(-50%); width: var(--rules-width);
            text-align: center; pointer-events: none;
            z-index: 10;
        }

        .rules-title {
            font-size: calc(var(--rules-font-size) + 2px);
            font-weight: 800; color: var(--gold-color);
            margin-bottom: 5px; text-transform: uppercase;
        }

        .rules-sub {
            font-size: var(--rules-font-size); font-weight: 500;
            color: #eee; margin-bottom: 2px;
        }

        .rules-divider {
            width: var(--line-width); height: 1px;
            background: linear-gradient(to right, transparent, #fff, transparent);
            margin: 5px auto;
        }

        .rules-list {
            font-size: var(--rules-font-size); line-height: 1.6;
            color: #fff; font-weight: 600;
        }

        /* TIMER CLEANUP */
        .timer-panel {
            position: absolute; top: var(--timer-top); left: 50%;
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        #live-clock {
            font-family: 'Courier New', monospace; font-size: var(--timer-font-size); 
            font-weight: 900; color: var(--timer-color); text-shadow: 0 0 5px #000;
        }

        /* COIN RAIN */
        .coin {
            position: absolute; width: 14px; height: 14px;
            background: radial-gradient(circle at 30% 30%, #fff9b1, #ffcc00 40%, #d4a017);
            border-radius: 50%; box-shadow: 0 0 5px rgba(255, 215, 0, 0.6);
            pointer-events: none; z-index: 5; animation: coinFall linear infinite;
        }
        @keyframes coinFall {
            0% { transform: translateY(-20px) rotateY(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(120px) rotateY(360deg); opacity: 0; }
        }

        /* PODIUM & RANKINGS */
        .top-podium {
            position: absolute; top: var(--top3-group-top); width: 100%;
            display: flex; justify-content: center; align-items: flex-end; gap: var(--profile-gap);
        }
        .user-card { position: relative; display: flex; flex-direction: column; align-items: center; }
        .rank-pos-0 { transform: translate(var(--rank2-x-offset), var(--rank2-y-offset)); } 
        .rank-pos-1 { transform: translate(var(--rank1-x-offset), var(--rank1-y-offset)); } 
        .rank-pos-2 { transform: translate(var(--rank3-x-offset), var(--rank3-y-offset)); } 
        .avatar-frame { position: relative; width: var(--avatar-size); height: var(--avatar-size); display: flex; align-items: center; justify-content: center; }
        .rank-top-img { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 50px; z-index: 10; }
        .rank-pos-1 .avatar-img { width: var(--rank1-img-scale); height: var(--rank1-img-scale); }
        .rank-pos-0 .avatar-img { width: var(--rank2-img-scale); height: var(--rank2-img-scale); }
        .rank-pos-2 .avatar-img { width: var(--rank3-img-scale); height: var(--rank3-img-scale); }
        .avatar-img { border-radius: 50%; object-fit: cover; z-index: 1; }
        .frame-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(var(--frame-scale)); width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .user-name { font-size: var(--top3-name-size); font-weight: bold; margin-top: 15px; }
        .gift-tag { font-size: var(--top3-gift-size); color: var(--gold-color); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 12px; }

        .rankings-scroll { position: absolute; top: var(--list-top); left: 50%; transform: translateX(-50%); width: var(--list-width); height: var(--list-height); overflow-y: auto; }
        .rank-item { display: flex; align-items: center; padding: 6px; background: rgba(255, 255, 255, 0.05); margin-bottom: 4px; border-radius: 8px; }
        .rank-num { width: 20px; font-weight: 800; color: var(--gold-color); font-size: 11px; }
        .rank-img { width: 25px; height: 25px; border-radius: 50%; margin-right: 8px; }
        .rank-name { font-size: var(--list-font-size); font-weight: 600; flex: 1; overflow: hidden; white-space: nowrap; }
        .rank-count { font-size: 10px; color: #4CAF50; }
        ::-webkit-scrollbar { width: 0px; }
        .nav-btns { position: fixed; right: var(--btn-right); bottom: var(--btn-bottom); display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
        .n-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--gold-color); border: 2px solid #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="nav-btns">
    <button class="n-btn" onclick="scrollContent('up')">▲</button>
    <button class="n-btn" onclick="scrollContent('down')">▼</button>
</div>

<div class="event-wrapper" id="main-wrapper">
    <div class="game-rules-section">
        <div class="rules-title">[Game rules]</div>
        <div class="rules-sub">Angel gift only.</div>
        <div class="rules-divider"></div>
        <div class="rules-list">
            (1). Top 1 - 3% charm extra.<br>
            (2). Top 2 - 2% charm extra.<br>
            (3). Top 3 - 1% charm extra.
        </div>
    </div>

    <div class="timer-panel">
        <div id="live-clock">RESET IN: --:--:--</div>
    </div>

    <div class="top-podium" id="top3-anchor"></div>
    <div class="rankings-scroll" id="list-anchor"></div>
</div>

<script>
    function spawnCoins() {
        const wrapper = document.getElementById('main-wrapper');
        const podium = document.getElementById('top3-anchor');
        setInterval(() => {
            const coin = document.createElement('div');
            coin.className = 'coin';
            const rect = podium.getBoundingClientRect();
            const randomX = Math.random() * rect.width + rect.left;
            const startY = rect.top - 30;
            coin.style.left = randomX + 'px';
            coin.style.top = startY + 'px';
            const duration = Math.random() * 1.5 + 1;
            coin.style.animationDuration = duration + 's';
            wrapper.appendChild(coin);
            setTimeout(() => coin.remove(), duration * 1000);
        }, 200);
    }

    function scrollContent(direction) {
        const amount = window.innerHeight * 0.4;
        window.scrollBy({ top: direction === 'up' ? -amount : amount, behavior: 'smooth' });
    }

    const players = [
        { id: 1, name: "Boss_Elite", gifts: 15200, img: "https://i.pravatar.cc/100?u=1" },
        { id: 2, name: "King_iK", gifts: 12800, img: "https://i.pravatar.cc/100?u=2" },
        { id: 3, name: "Queen_Rose", gifts: 10200, img: "https://i.pravatar.cc/100?u=3" },
        { id: 4, name: "Agent_Alpha", gifts: 8500, img: "https://i.pravatar.cc/100?u=4" },
        { id: 5, name: "Shadow_iK", gifts: 7100, img: "https://i.pravatar.cc/100?u=5" },
        { id: 6, name: "User_VIP", gifts: 6200, img: "https://i.pravatar.cc/100?u=6" },
        { id: 7, name: "Star_Boy", gifts: 5800, img: "https://i.pravatar.cc/100?u=7" },
        { id: 8, name: "iK_Prince", gifts: 4500, img: "https://i.pravatar.cc/100?u=8" },
        { id: 9, name: "Magic_X", gifts: 3200, img: "https://i.pravatar.cc/100?u=9" },
        { id: 10, name: "Old_Player", gifts: 2900, img: "https://i.pravatar.cc/100?u=10" }
    ];

    function renderEvent() {
        const top3Box = document.getElementById('top3-anchor');
        const listBox = document.getElementById('list-anchor');
        players.sort((a,b) => b.gifts - a.gifts);
        const order = [1, 0, 2]; 
        const frameFiles = ['22.png', '11.png', '33.png']; 
        const rankTopImages = ['2.png', '1.png', '3.png']; 
        top3Box.innerHTML = '';
        order.forEach((idx, i) => {
            const p = players[idx];
            top3Box.innerHTML += `
                <div class="user-card rank-pos-${i}">
                    <img src="${rankTopImages[i]}" class="rank-top-img">
                    <div class="avatar-frame">
                        <img src="${p.img}" class="avatar-img">
                        <img src="${frameFiles[idx]}" class="frame-overlay">
                    </div>
                    <span class="user-name">${p.name}</span>
                    <span class="gift-tag">👼 ${p.gifts}</span>
                </div>
            `;
        });
        listBox.innerHTML = '';
        players.slice(3, 10).forEach((p, i) => {
            listBox.innerHTML += `
                <div class="rank-item">
                    <div class="rank-num">${i + 4}</div>
                    <img src="${p.img}" class="rank-img">
                    <div class="rank-name">${p.name}</div>
                    <div class="rank-count">👼 ${p.gifts}</div>
                </div>
            `;
        });
    }

    setInterval(() => {
        document.getElementById('live-clock').innerText = "RESET IN: " + new Date().toLocaleTimeString('en-GB');
    }, 1000);

    renderEvent();
    spawnCoins();
</script>
</body>
</html>
